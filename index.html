<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Викторина — Русский язык и литература</title>
  <meta name="description" content="Интерактивная викторина по теме Авлоний и родной язык. Открытый урок." />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-badge">Открытый урок</div>
    <h1>Русский язык и литература</h1>
    <p>Нажмите на ячейку, ответьте на вопрос и откройте часть фразы</p>
    <div class="header-actions" id="user-controls" style="display: none;">
      <span class="user-display" id="user-display-name"></span>
      <button class="btn-head" onclick="openLeaderboard()">Рейтинг</button>
      <button class="btn-head" onclick="logout()">Выйти</button>
    </div>
  </header>

  <!-- Quiz grid: 2 rows × 3 columns -->
  <div class="quiz-grid" id="quiz-grid"></div>

  <footer>v2.4 &nbsp;·&nbsp; Викторина &nbsp;·&nbsp; 2026</footer>

  <!-- Question modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-question">
      <button class="modal-close" onclick="closeModal()" aria-label="Закрыть">✕</button>
      <div class="modal-label">Вопрос</div>
      <p class="modal-question" id="modal-question"></p>
      <input
        class="modal-input"
        type="text"
        id="modal-input"
        placeholder="Введите ответ..."
        autocomplete="off"
      />
      <button class="btn-check" id="btn-check" onclick="checkAnswer()">Проверить</button>
      <div class="feedback" id="modal-feedback"></div>
    </div>
  </div>

  <!-- Win overlay -->
  <div class="win-overlay" id="win-overlay">
    <div class="win-trophy">🏆</div>
    <h2 class="win-title">Поздравляем!</h2>
    <p class="win-phrase">
      «Именно родной язык и литература показывают существование любой нации в мире.»
    </p>
    <button class="btn-reset" onclick="openLeaderboard(); closeWin();">Смотреть рейтинг</button>
  </div>

  <!-- Auth modal -->
  <div class="auth-overlay active" id="auth-overlay">
    <div class="modal auth-modal" role="dialog">
      <div class="modal-label" id="auth-title">Вход</div>
      <form id="register-form" onsubmit="event.preventDefault(); handleAuth()">
        <input class="modal-input" type="text" id="reg-display-name" placeholder="Ваше имя" required autocomplete="off" />
        <div style="display: flex; gap: 10px; margin-bottom: 14px;">
          <select id="reg-class-number" class="modal-input" style="margin-bottom: 0;" required>
            <option value="" disabled selected>Класс</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
          </select>
          <select id="reg-class-letter" class="modal-input" style="margin-bottom: 0;" required>
            <option value="" disabled selected>Буква</option>
            <option value="А">А</option>
            <option value="Б">Б</option>
            <option value="В">В</option>
            <option value="Г">Г</option>
            <option value="Д">Д</option>
            <option value="И">И</option>
          </select>
        </div>
        <button type="submit" class="btn-check">Начать</button>
      </form>
      <div class="feedback" id="auth-feedback"></div>
    </div>
  </div>

  <!-- Leaderboard modal -->
  <div class="modal-overlay" id="leaderboard-overlay">
    <div class="modal" style="max-height: 80vh; overflow-y: auto;" role="dialog">
      <button class="modal-close" onclick="closeLeaderboard()" aria-label="Закрыть">✕</button>
      <div class="modal-label">Рейтинг</div>
      <div class="leaderboard-list" id="leaderboard-list"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
